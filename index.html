<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bike trip guide advisor with maps, AI and others">
  <meta name="theme-color" content="#2196F3">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><circle cx='96' cy='96' r='90' fill='%232196F3'/><text x='96' y='110' font-size='80' text-anchor='middle' fill='white' font-family='Arial'>🚴</text></svg>">
  <title>Super Duper Winner - Bike Trip Guide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 500px; width: 100%; }
    h1 { color: #2196F3; text-align: center; margin-bottom: 10px; }
    h2 { color: #764ba2; text-align: center; font-size: 18px; margin-bottom: 30px; }
    .startup-image { text-align: center; font-size: 120px; margin: 30px 0; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
    .info { background: #f5f5f5; padding: 20px; border-radius: 10px; margin: 30px 0; }
    .info p { margin: 12px 0; color: #333; line-height: 1.6; }
    button { width: 100%; background: #2196F3; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌍 Super Duper Winner</h1>
    <div class="startup-image">🚴</div>
    <h2>Bike Trip Guide Advisor</h2>
    <div class="info">
      <p><strong>📍 Maps:</strong> Explore bike routes on interactive maps</p>
      <p><strong>🤖 AI Guide:</strong> Get personalized trip recommendations</p>
      <p><strong>📱 Installable:</strong> Works on iPhone and all devices</p>
      <p><strong>⚡ Offline:</strong> Fully functional without internet</p>
    </div>
    <button onclick="installApp()">Install App on Home Screen</button>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
      } else {
        alert('To install on iPhone: tap Share → Add to Home Screen');
      }
    }
  </script>
</body>
</html>
